name: npm publish

on:
  workflow_dispatch:
    inputs:
      package_version:
        description: Exact package.json version to publish
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  preflight:
    name: Preflight package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level=high

      - name: Run secret scan
        run: npm run secret-scan

      - name: Verify package version input
        env:
          PACKAGE_VERSION: ${{ inputs.package_version }}
        run: |
          node --input-type=module -e "import { readFile } from 'node:fs/promises'; const pkg = JSON.parse(await readFile('package.json', 'utf8')); const expected = process.env.PACKAGE_VERSION; if (!expected) throw new Error('package_version input is required'); if (pkg.version !== expected) throw new Error('package_version ' + expected + ' does not match package.json version ' + pkg.version); console.log('Preflight for ' + pkg.name + '@' + pkg.version);"

      - name: Run package metadata check
        run: npm run check

      - name: Run test suite
        run: npm test

      - name: Verify package dry run
        run: npm pack --dry-run

  publish:
    name: Publish package
    runs-on: ubuntu-latest
    needs: preflight
    environment: npm-publish

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level=high

      - name: Run secret scan
        run: npm run secret-scan

      - name: Verify package version input
        env:
          PACKAGE_VERSION: ${{ inputs.package_version }}
        run: |
          node --input-type=module -e "import { readFile } from 'node:fs/promises'; const pkg = JSON.parse(await readFile('package.json', 'utf8')); const expected = process.env.PACKAGE_VERSION; if (!expected) throw new Error('package_version input is required'); if (pkg.version !== expected) throw new Error('package_version ' + expected + ' does not match package.json version ' + pkg.version); console.log('Publishing ' + pkg.name + '@' + pkg.version);"

      - name: Re-run package metadata check
        run: npm run check

      - name: Re-run test suite
        run: npm test

      - name: Re-run package dry run
        run: npm pack --dry-run

      - name: Publish package to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
