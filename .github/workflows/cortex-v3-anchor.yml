name: Cortex v3 Anchor Build and Test

on:
  push:
    paths:
      - 'cortex-v3/**'
      - '.github/workflows/cortex-v3-anchor.yml'
  pull_request:
    paths:
      - 'cortex-v3/**'
      - '.github/workflows/cortex-v3-anchor.yml'
  workflow_dispatch:

env:
  SOLANA_CLI_VERSION: 1.18.26
  ANCHOR_VERSION: 0.30.1
  NODE_VERSION: 20

jobs:
  anchor-build:
    name: Anchor Build and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cortex-v3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Solana CLI
        id: cache-solana
        uses: actions/cache@v4
        with:
          path: ~/.local/share/solana
          key: solana-${{ runner.os }}-${{ env.SOLANA_CLI_VERSION }}

      - name: Install Solana CLI from GitHub release
        if: steps.cache-solana.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/share/solana
          cd ~/.local/share/solana
          curl -L -o solana-release.tar.bz2 "https://github.com/solana-labs/solana/releases/download/v${SOLANA_CLI_VERSION}/solana-release-x86_64-unknown-linux-gnu.tar.bz2"
          tar -xjf solana-release.tar.bz2
          mv solana-release solana-${SOLANA_CLI_VERSION}
          rm solana-release.tar.bz2
          echo "$HOME/.local/share/solana/solana-${SOLANA_CLI_VERSION}/bin" >> $GITHUB_PATH

      - name: Add Solana to PATH
        run: echo "$HOME/.local/share/solana/solana-${SOLANA_CLI_VERSION}/bin" >> $GITHUB_PATH

      - name: Configure Solana
        run: |
          mkdir -p ~/.config/solana
          echo '${{ secrets.SOLANA_DEVNET_WALLET }}' > ~/.config/solana/id.json
          solana config set --url devnet
          solana config get
          echo "Public key: $(solana address)"

      - name: Install Anchor CLI
        run: npm install -g @coral-xyz/anchor-cli@${ANCHOR_VERSION}

      - name: Verify Anchor CLI
        run: anchor --version

      - name: Install workspace dependencies
        run: npm install

      - name: Cargo Check (Rust compilation)
        run: cargo check --workspace

      - name: Anchor Build
        run: anchor build

      - name: Anchor Test
        run: anchor test --skip-build
        timeout-minutes: 15

      - name: Fund devnet wallet
        run: solana airdrop 2 $(solana address) --url devnet
        continue-on-error: true
