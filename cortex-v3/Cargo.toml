[workspace]
members = [
    "programs/*"
]
resolver = "2"

[patch.crates-io]
blake3 = { version = "=1.5.1" }
digest = { version = "=0.10.7" }
block-buffer = { version = "=0.10.4" }

[profile.release]
overflow-checks = true
lto = "fat"
codegen-units = 1
[profile.release.build-override]
opt-level = 3
incremental = false
codegen-units = 1
